server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets — safe to cache forever; a redeploy emits
    # new filenames so this can never serve stale code.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html and env.js are NOT content-hashed and bootstrap every route —
    # always revalidate so a redeploy's new asset hashes load immediately.
    # "no-cache" allows the browser to store the response but forces revalidation
    # via ETag before use — do NOT use "no-store" (it disables back/forward cache).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    location = /env.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
