# Web SPA nginx config — COMPOSE / SINGLE-HOST variant.
#
# Consumed by the ROOT Dockerfile `web` stage (COPY -> conf.d/default.conf) for
# docker-compose / single-host deploys, where the API is reachable on the shared
# Docker network as `api:3000`. That hostname resolves NOWHERE else.
#
# The Railway web service instead builds packages/web/Dockerfile, which uses
# packages/web/nginx.conf.template: there web + api are SEPARATE public services,
# so it proxies /api/ to the API's PUBLIC URL via `${API_URL}` (envsubst at
# container start) and listens on `${PORT}`. Keep the cache-header blocks in the
# two files in sync. See docs/deployment.md (Production readiness).

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Content-hashed build assets — safe to cache forever; a redeploy emits
    # new filenames so this can never serve stale code.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Retired marketing/legal pages moved to the standalone marketing site.
    # This edge serves page requests directly, so the API's redirect handler
    # is NOT in front of these paths — redirect them here or they'd fall into
    # the SPA fallback and render an empty shell (the React routes were
    # removed). A regex location outranks the plain `location /` prefix. 302
    # (not 301) since the destination is a separate deploy. Kept in sync with
    # nginx.conf.template and packages/api/src/marketing-redirects.ts.
    location ~ ^/(features|pricing|about|download|privacy|terms)/?$ {
        return 302 https://therivetapp.com$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html and env.js are NOT content-hashed and bootstrap every route —
    # always revalidate so a redeploy's new asset hashes load immediately.
    # "no-cache" allows the browser to store the response but forces revalidation
    # via ETag before use — do NOT use "no-store" (it disables back/forward cache).
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    location = /env.js {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /api/ {
        # COMPOSE-ONLY upstream: `api` is the API service on the shared Docker
        # network (single-host). On Railway this block is unused — the SPA calls
        # the API's public origin (VITE_API_URL, baked at build time) and the
        # .template variant proxies via ${API_URL}. Do not hardcode a public
        # host here; change API_URL on the web service instead.
        #
        # NO trailing slash on proxy_pass: the API mounts every route under
        # the /api prefix (app.ts `app.use('/api/...')`), so the incoming
        # /api/... URI must be forwarded unchanged. A trailing slash here
        # would rewrite /api/jobs -> /jobs upstream and 404 every call.
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # View-token-gated public API mounts (customer intake / estimate /
    # invoice / feedback) live at bare /public on the API — proxy them too,
    # else they fall into the SPA fallback and never reach the API.
    location /public/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
