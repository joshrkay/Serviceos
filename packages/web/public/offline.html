<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Rivet</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 22rem; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { color: #94a3b8; line-height: 1.5; margin: 0 0 1.25rem; }
      button {
        min-height: 44px;
        padding: 0 1.25rem;
        border: 0;
        border-radius: 0.625rem;
        background: #3b82f6;
        color: white;
        font-size: 0.95rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Rivet can't reach the network right now. Anything you captured will sync
        once you're back online.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
