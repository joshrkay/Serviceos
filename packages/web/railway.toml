[build]
builder = "dockerfile"
dockerfilePath = "packages/web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Tell Railway's edge which container port to route to. The web service has
# PORT=8080 as a service-level variable; nginx.conf.template does
# `listen ${PORT};` so nginx listens on 8080. This MUST match that port.
port = 8080
