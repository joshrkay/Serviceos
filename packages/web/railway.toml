[build]
builder = "dockerfile"
dockerfilePath = "packages/web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Tell Railway's edge which container port to route to. The
# @serviceos/web service has PORT=8080 as a service-level variable;
# nginx.conf.template uses `listen ${PORT};` so nginx listens on 8080.
# This line must match the service-level PORT.
port = 8080
