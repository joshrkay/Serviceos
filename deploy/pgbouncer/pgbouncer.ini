;; ─────────────────────────────────────────────────────────────────────────
;; PgBouncer — transaction-mode connection pooler for the scale-to-1000 shape.
;;
;; Why: each API replica opens its own Postgres pool (DB_MAX_CONNECTIONS). At
;; N replicas the raw connection count blows past Postgres `max_connections`.
;; PgBouncer multiplexes one server backend across many short client
;; transactions, so the *server-side* cost is `default_pool_size`, not
;; N × DB_MAX_CONNECTIONS. See docs/runbooks/scaling.md (Two-DSN setup).
;;
;; Two-DSN model (IMPORTANT):
;;   • API DATABASE_URL        → PgBouncer :6432  (request hot path, all
;;                               transaction-scoped `SET LOCAL` work — pooling
;;                               safe and multiplexed here).
;;   • API DATABASE_DIRECT_URL → Postgres  :5432  (session-scoped: leader
;;                               advisory locks, the proposal idempotency lock,
;;                               LISTEN/NOTIFY — these MUST keep a stable
;;                               backend and therefore bypass PgBouncer).
;;
;; This file is mounted read-only at /etc/pgbouncer/pgbouncer.ini by
;; deploy/docker-compose.prod.yml. It is secret-free: credentials live in
;; userlist.txt (templated) or are resolved via auth_query at runtime.
;; ─────────────────────────────────────────────────────────────────────────

[databases]
;; Logical database the API connects to. host/port/dbname match the
;; `postgres` service + POSTGRES_DB in docker-compose.prod.yml. Leaving the
;; user/password OUT here makes PgBouncer forward the client-supplied
;; credentials and verify them (auth_file / auth_query) — no secrets in git.
;; For a managed Postgres (Railway/RDS) change host/port/dbname accordingly.
serviceos = host=postgres port=5432 dbname=serviceos
;; Fallback so an overridden POSTGRES_DB still resolves: the API connects to
;; pgbouncer requesting `${POSTGRES_DB}` (docker-compose.prod.yml), so if that
;; is set to anything other than `serviceos`, the explicit entry above won't
;; match and PgBouncer would reject with "unknown database". This wildcard
;; forwards the client-requested dbname straight to the `postgres` backend.
* = host=postgres port=5432

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

;; ── Pooling ──────────────────────────────────────────────────────────────
;; transaction mode is REQUIRED for multi-replica fan-in. The app keeps
;; request transactions short (it never awaits LLM/HTTP inside the RLS txn) so
;; a backend is released between statements and multiplexing actually happens.
pool_mode = transaction
;; Client-facing ceiling — how many app-side connections PgBouncer will accept
;; across all replicas (matches scaling.md's example of 1000).
max_client_conn = 1000
;; Server-facing budget per (database,user) pair — the REAL Postgres
;; connection cost. Keep the sum of all pools under Postgres max_connections.
default_pool_size = 25
;; Keep a few warm backends so a cold replica isn't latency-spiked on first hit.
min_pool_size = 5
;; Short-lived burst headroom above default_pool_size.
reserve_pool_size = 5
reserve_pool_timeout = 3
;; 0 = no extra cap beyond the per-pool sizes above (Postgres max_connections
;; is the real ceiling). Raise/lower if you co-locate other pools.
max_db_connections = 0

;; ── Auth ─────────────────────────────────────────────────────────────────
;; SCRAM (Postgres 16 default). Two supported, secret-free options:
;;
;;  (1) userlist.txt  — auth_file below points at a SCRAM verifier list. The
;;      committed userlist.txt ships a PLACEHOLDER only; populate the real
;;      verifier at deploy time (see that file's header). Active by default.
;;
;;  (2) auth_query    — PRODUCTION-PREFERRED. Look the verifier up in Postgres
;;      via a least-privilege SECURITY DEFINER function instead of shipping a
;;      list. To switch: create the function once (psql) —
;;        CREATE ROLE pgbouncer_auth LOGIN PASSWORD '<set-at-deploy>';
;;        CREATE FUNCTION pgbouncer_get_auth(uname text)
;;          RETURNS TABLE(usename text, passwd text)
;;          LANGUAGE sql SECURITY DEFINER SET search_path = pg_catalog AS
;;          $$ SELECT rolname::text, rolpassword::text FROM pg_authid
;;             WHERE rolname = uname AND rolcanlogin; $$;
;;        REVOKE ALL ON FUNCTION pgbouncer_get_auth(text) FROM PUBLIC;
;;        GRANT EXECUTE ON FUNCTION pgbouncer_get_auth(text) TO pgbouncer_auth;
;;      then set the two lines below and drop auth_file:
;;        ; auth_user  = pgbouncer_auth
;;        ; auth_query = SELECT usename, passwd FROM pgbouncer_get_auth($1)
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; ── Driver compatibility ─────────────────────────────────────────────────
;; node-postgres (pg) negotiates extra_float_digits on connect; PgBouncer
;; rejects unknown startup params unless they're ignored here. Add more
;; (space/comma separated) only if the driver negotiates them.
ignore_startup_parameters = extra_float_digits

;; ── Admin / ops ──────────────────────────────────────────────────────────
;; Roles allowed on the PgBouncer admin console (SHOW POOLS, etc.) and the
;; stats interface. Keep to the app/operator role.
admin_users = serviceos
stats_users = serviceos
;; TLS to the upstream Postgres. 'prefer' lets local docker-compose (no TLS)
;; work; set 'require' or 'verify-full' against a managed Postgres in prod.
server_tls_sslmode = prefer
;; transaction mode resets state per-transaction, so DISCARD ALL is only run
;; in session mode (server_reset_query_always defaults off) — safe to leave.
server_reset_query = DISCARD ALL
;; Recycle idle/aged backends so a long-lived pooler doesn't pin stale conns.
server_idle_timeout = 600
log_connections = 0
log_disconnections = 0
