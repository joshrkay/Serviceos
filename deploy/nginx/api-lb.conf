# nginx — API load balancer for the scaled `api` replicas
# (deploy/docker-compose.prod.yml). Fans requests across
# `docker compose up --scale api=N` using Docker's embedded DNS (127.0.0.11).
# A *variable* proxy_pass forces per-request re-resolution, so replicas added
# or removed by --scale enter/leave rotation without an nginx reload.
#
# This is the API edge ONLY:
#   • it NEVER caches — every /api/* response is dynamic + per-tenant, and
#   • it carries WebSocket upgrades (dashboard gateway + Twilio media streams).
# SPA static assets are served by the separate web image
# (packages/web/nginx.conf), which owns its own immutable-asset cache headers.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Docker embedded DNS — required for per-request re-resolution of `api`.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Preserve the real client IP so the API's `trust proxy` + per-IP rate
    # limits and req.ip resolve to the actual client, not the LB.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket upgrade (gateway + voice media streams).
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Never cache the dynamic API or WS upgrades.
    proxy_buffering off;
    proxy_cache     off;

    # Liveness passthrough for compose / external healthchecks.
    location = /health {
        set $api http://api:3000;
        proxy_pass $api;
    }

    # API + WebSocket traffic — explicit no-store; long read/idle timeout so
    # streaming voice sockets aren't cut at the default 60s.
    location /api/ {
        set $api http://api:3000;
        proxy_pass $api;
        add_header Cache-Control "no-store" always;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Catch-all → API replicas (this edge fronts the API, not the SPA).
    location / {
        set $api http://api:3000;
        proxy_pass $api;
    }
}
