# ServiceOS domain vocabulary — Regional terms & phrasings
# Schema: data/vocab/schema.json
# Terms, slang, and conditions that are strongly region-specific. The voice
# agent must recognize these to triage and route correctly. `regions` lists the
# region(s) where the term is common; some terms appear nationwide but carry
# region-specific weight (e.g. "monsoon" only in the Southwest).
