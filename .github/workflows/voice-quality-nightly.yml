# Voice Quality v1 Layer 1 — nightly gate.
#
# Runs the SAME Layer-1 corpus suite as the PR-checks `voice-quality` job
# (InMemory repo bundle, deterministic script-aware cassettes, no API keys)
# on a daily schedule, with the launch gate ENFORCED.
#
# History (QUALITY-2026-07-12 WS1): this job used to run a `VOICE_QUALITY_REPO=pg`
# variant against a Postgres service, behind `continue-on-error: true`. But the
# runner's `pg` mode was a throwing stub — the corpus never actually ran against
# Postgres; the step errored and was ignored, so the nightly was decorative. The
# `pg` option has been removed (Layer 1 is memory-only: the LLM is mocked and the
# driver reads several repos the bundle doesn't own, so a partial-Pg bundle would
# be a misleading signal). The nightly now runs the real memory-mode corpus with
# the gate enforced and no continue-on-error, so a regression reddens it. A true
# DB-backed Layer-1 harness (real Pg repos + migrations + RLS role) is tracked as
# future work, not faked here.
name: Voice Quality (nightly)

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

jobs:
  layer1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run voice quality (Layer 1, gate enforced)
        run: npm run voice-quality --workspace=packages/api
        env:
          VOICE_QUALITY_CASSETTE_MODE: replay
          # Enforced: the merge step exits non-zero on any launch-gate blocker
          # (floor break, a bucket under threshold incl. Spanish ≥90%, overall
          # <90%). No continue-on-error — a red nightly is a real signal.
          VOICE_QUALITY_ENFORCE_LAUNCH_GATE: 'true'
      - name: Cassette staleness report (informational)
        if: always()
        # Deterministic, offline (no DB/LLM): surfaces how much of the corpus
        # is served by the replay drift-fallback rather than exact replay, so
        # re-records become deliberate. Non-gating: run without --strict, and
        # continue-on-error so a corrupt cassette can't redden this nightly.
        continue-on-error: true
        run: npm run voice-quality:staleness --workspace=packages/api
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-quality-nightly-report
          path: |
            packages/api/voice-quality-report.json
            packages/api/voice-quality-cassette-staleness.json
