name: Deploy
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci

      - name: Type check API (build config)
        run: npx tsc --project tsconfig.build.json --noEmit
        working-directory: packages/api
      - name: Type check Web
        run: npx tsc --noEmit
        working-directory: packages/web

      - name: Voice smoke (synthetic) — §11 H2 Layer A
        # Fast structural gate: Media Streams server attaches and the
        # documented upgrade contract is stable. Tier-2 promotion will
        # add the full canned-audio → CreateBooking assertion.
        # See docs/runbooks/launch-quality-bar.md.
        run: npx vitest run test/voice/voice-smoke.synthetic.test.ts
        working-directory: packages/api
        env:
          NODE_ENV: test

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --reporter=verbose

      - name: Integration tests
        run: npm run test:integration
        working-directory: packages/api
        env:
          TEST_DB: testcontainers

      - name: Coverage check
        run: npm run test:coverage

      - name: Migration dry-run
        run: npm run migrate:dryrun
        working-directory: packages/api

  # Railway deployment pipeline
  deploy-railway-dev:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v5
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Run API migrations (Development)
        run: railway run --service "@serviceos/api" --environment Development -- node packages/api/dist/src/db/migrate.js
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy API to Railway (Development)
        run: railway up --service "@serviceos/api" --environment Development --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy Web to Railway (Development)
        run: railway up --service "@serviceos/web" --environment Development --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-railway-prod:
    needs: deploy-railway-dev
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v5
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Run API migrations (production)
        run: railway run --service "@serviceos/api" --environment production -- node packages/api/dist/src/db/migrate.js
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy API to Railway (production)
        run: railway up --service "@serviceos/api" --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      - name: Deploy Web to Railway (production)
        run: railway up --service "@serviceos/web" --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
