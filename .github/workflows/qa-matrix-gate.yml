# Nightly + manual QA matrix gate against Railway dev.
#
# Required repository secrets (11) — manifest:
#   docs/runbooks/qa-github-secrets.md
#   E2E_BASE_URL, E2E_API_URL
#   E2E_DB_URL_READONLY, E2E_DB_URL_READWRITE
#   E2E_CLERK_HMAC_SECRET
#   E2E_TENANT_A_ID, E2E_TENANT_A_CUSTOMER_ID, E2E_TENANT_A_JOB_ID
#   E2E_TENANT_B_ID, E2E_TENANT_B_CUSTOMER_ID, E2E_TENANT_B_JOB_ID
#
# Deploy-side (Railway API): CLERK_DEV_HMAC_TOKENS=true
# Manual rerun: Actions → QA Matrix Gate → Run workflow

name: QA Matrix Gate

on:
  workflow_dispatch:
  schedule:
    # Nightly against Railway dev (02:00 UTC)
    - cron: '0 2 * * *'

jobs:
  qa-matrix-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # WS7 — fail fast (and loud) when the 11 QA-matrix secrets are absent,
      # mirroring mms-vision-smoke.yml. qa:doctor also validates these, but it
      # only runs after npm ci + Playwright browser install (~minutes); this
      # early guard makes a missing-credentials run fail in seconds with an
      # explicit message so a secretless run can never be mistaken for a green
      # gate. See docs/launch/secret-manifest.md.
      - name: Verify QA matrix secrets are present
        run: |
          missing=""
          for var in E2E_BASE_URL E2E_API_URL E2E_DB_URL_READONLY E2E_DB_URL_READWRITE \
                     E2E_CLERK_HMAC_SECRET E2E_TENANT_A_ID E2E_TENANT_A_CUSTOMER_ID \
                     E2E_TENANT_A_JOB_ID E2E_TENANT_B_ID E2E_TENANT_B_CUSTOMER_ID \
                     E2E_TENANT_B_JOB_ID; do
            if [ -z "${!var}" ]; then missing="$missing $var"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::QA Matrix Gate requires these secrets, which are empty:$missing"
            echo "This gate runs against Railway dev with real Clerk HMAC tokens — without these secrets it cannot run, and a skipped run is NOT a green gate."
            exit 1
          fi
          echo "QA matrix secrets verified present."
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_DB_URL_READONLY: ${{ secrets.E2E_DB_URL_READONLY }}
          E2E_DB_URL_READWRITE: ${{ secrets.E2E_DB_URL_READWRITE }}
          E2E_CLERK_HMAC_SECRET: ${{ secrets.E2E_CLERK_HMAC_SECRET }}
          E2E_TENANT_A_ID: ${{ secrets.E2E_TENANT_A_ID }}
          E2E_TENANT_A_CUSTOMER_ID: ${{ secrets.E2E_TENANT_A_CUSTOMER_ID }}
          E2E_TENANT_A_JOB_ID: ${{ secrets.E2E_TENANT_A_JOB_ID }}
          E2E_TENANT_B_ID: ${{ secrets.E2E_TENANT_B_ID }}
          E2E_TENANT_B_CUSTOMER_ID: ${{ secrets.E2E_TENANT_B_CUSTOMER_ID }}
          E2E_TENANT_B_JOB_ID: ${{ secrets.E2E_TENANT_B_JOB_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Preflight (doctor)
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_DB_URL_READONLY: ${{ secrets.E2E_DB_URL_READONLY }}
          E2E_DB_URL_READWRITE: ${{ secrets.E2E_DB_URL_READWRITE }}
          E2E_CLERK_HMAC_SECRET: ${{ secrets.E2E_CLERK_HMAC_SECRET }}
          E2E_TENANT_A_ID: ${{ secrets.E2E_TENANT_A_ID }}
          E2E_TENANT_A_CUSTOMER_ID: ${{ secrets.E2E_TENANT_A_CUSTOMER_ID }}
          E2E_TENANT_A_JOB_ID: ${{ secrets.E2E_TENANT_A_JOB_ID }}
          E2E_TENANT_B_ID: ${{ secrets.E2E_TENANT_B_ID }}
          E2E_TENANT_B_CUSTOMER_ID: ${{ secrets.E2E_TENANT_B_CUSTOMER_ID }}
          E2E_TENANT_B_JOB_ID: ${{ secrets.E2E_TENANT_B_JOB_ID }}
        run: npm run qa:doctor

      - name: Seed QA tenants
        env:
          E2E_DB_URL_READWRITE: ${{ secrets.E2E_DB_URL_READWRITE }}
          E2E_TENANT_A_ID: ${{ secrets.E2E_TENANT_A_ID }}
          E2E_TENANT_B_ID: ${{ secrets.E2E_TENANT_B_ID }}
        run: npx tsx e2e/qa-matrix/fixtures/seed.ts

      - name: Run QA matrix
        env:
          QA_MATRIX: '1'
          QA_RUN_ID: ${{ github.run_id }}
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_DB_URL_READONLY: ${{ secrets.E2E_DB_URL_READONLY }}
          E2E_DB_URL_READWRITE: ${{ secrets.E2E_DB_URL_READWRITE }}
          E2E_CLERK_HMAC_SECRET: ${{ secrets.E2E_CLERK_HMAC_SECRET }}
          E2E_TENANT_A_ID: ${{ secrets.E2E_TENANT_A_ID }}
          E2E_TENANT_A_CUSTOMER_ID: ${{ secrets.E2E_TENANT_A_CUSTOMER_ID }}
          E2E_TENANT_A_JOB_ID: ${{ secrets.E2E_TENANT_A_JOB_ID }}
          E2E_TENANT_B_ID: ${{ secrets.E2E_TENANT_B_ID }}
          E2E_TENANT_B_CUSTOMER_ID: ${{ secrets.E2E_TENANT_B_CUSTOMER_ID }}
          E2E_TENANT_B_JOB_ID: ${{ secrets.E2E_TENANT_B_JOB_ID }}
        run: npm run e2e:qa-matrix

      - name: Enforce gates
        env:
          QA_RUN_ID: ${{ github.run_id }}
        run: npm run qa:matrix:gate

      - name: Upload QA report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-matrix-report-${{ github.run_id }}
          path: qa/reports/
          retention-days: 30
