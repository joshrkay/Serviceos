name: E2E

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ubuntu-latest currently ships broken third-party PPAs
      # (deadsnakes, ondrej/php) that return 403 Forbidden during
      # `apt-get update`. Playwright's `--with-deps` runs apt-get update
      # internally, so the whole step fails with exit 100. Drop those
      # sources before installing browser deps.
      - name: Remove broken apt repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/deadsnakes-* \
                     /etc/apt/sources.list.d/ondrej-* || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # WS7 — Option B (docs/launch/ci-gating.md) keeps this workflow GREEN
      # without the real Clerk secrets, running only the hermetic smoke +
      # always-on Journey-1. That is intentional, but a green check here must
      # not be silently mistaken for full journey coverage. Emit an explicit
      # annotation so the coverage gap is visible on every secretless run.
      # (GitHub Actions forbids `secrets` in step-level `if:`, so gate in-shell.)
      - name: Annotate E2E coverage scope
        run: |
          if [ -z "$E2E_CLERK_SECRET_KEY" ] || [ -z "$E2E_CLERK_PUBLISHABLE_KEY" ]; then
            echo "::warning::E2E running smoke-only (Option B) — real-Clerk secrets absent, so the real-Clerk signup + full journey specs self-skip. A green result here does NOT prove full journey coverage. Add E2E_CLERK_PUBLISHABLE_KEY + E2E_CLERK_SECRET_KEY to upgrade to Option A."
          else
            echo "Real Clerk E2E secrets present — full journey specs will run (Option A)."
          fi
        env:
          E2E_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}

      # GitHub Actions forbids `secrets` in step-level `if:` — gate in-shell instead.
      - name: Onboarding API integration (migration 098)
        run: |
          if [ -z "$E2E_CLERK_SECRET_KEY" ]; then
            echo "Skipping onboarding integration — E2E_CLERK_SECRET_KEY not configured"
            exit 0
          fi
          npm run test:integration -- onboarding
        working-directory: packages/api
        env:
          TEST_DB: testcontainers
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}

      # The default `chromium` project runs every spec under e2e/ (minus the
      # opt-in qa-matrix / coverage-sweep / ui-flow projects). That includes the
      # ALWAYS-ON hermetic browser Journey-1
      # (e2e/journeys/signup-to-first-estimate.hermetic.spec.ts): it drives a
      # signed user.created webhook → REAL bootstrapTenant → first estimate with
      # ZERO Clerk secrets. It is NOT guarded by hasClerkTestingCreds, so it
      # gates every PR here; the API webServer boots in DEV_AUTH_BYPASS mode and
      # with a hermetic CLERK_WEBHOOK_SECRET via playwright.config.ts. The
      # sibling real-Clerk signup spec stays test.skip until the secrets below
      # land — it adds fidelity, it is not the only browser proof of Journey-1.
      - name: Run E2E tests
        run: npm run e2e
        env:
          CI: '1'
          # --- BEGIN: Clerk testing-tokens block (owned by Clerk agent) ---
          # Clerk testing tokens — used by e2e/global-setup.ts to prime the
          # bot-bypass token, and by journey specs to skip cleanly if absent.
          # Add these as GitHub repo secrets to unlock UI smoke + journey
          # tests. See qa/reports/2026-05-11/clerk-testing-tokens-runbook.md.
          E2E_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          E2E_CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          # The Vite dev server needs a syntactically valid pk_test_ at boot
          # (main.tsx throws without it). Prefer the real Clerk testing secret
          # when configured; otherwise fall back to a placeholder so hermetic
          # offline specs (W1-1 money-loop, no-401-storm) run on every PR
          # without E2E_CLERK_SECRET_KEY. The clerk-stub short-circuits the
          # script download either way — see e2e/helpers/clerk-stub.ts.
          # Placeholder = pk_test_ + base64("dummy.clerk.accounts.dev$").
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY || 'pk_test_ZHVtbXkuY2xlcmsuYWNjb3VudHMuZGV2JA==' }}
          # Real-key signal for smoke-ui / marketing specs that need Clerk CDN
          # widgets. Placeholder must NOT satisfy this — otherwise those specs
          # run-and-fail on runners where clerk.com is unreachable / invalid.
          E2E_HAS_REAL_CLERK_PK: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY != '' && 'true' || 'false' }}
          # §10 onboarding v2 — OnboardingShell + guard (e2e/journeys/onboarding-v2.spec.ts).
          # Enabled only when Clerk E2E secrets are configured (journey skips otherwise).
          VITE_ONBOARDING_V2_ENABLED: ${{ secrets.E2E_CLERK_SECRET_KEY != '' && 'true' || 'false' }}
          # --- END: Clerk testing-tokens block ---

          # --- BEGIN: Ephemeral test DB block ---
          # Activates e2e/fixtures/{setup,seed,teardown}-test-db.ts via
          # e2e/global-setup.ts. Only useful when Clerk testing tokens are
          # also configured — without them the journey specs skip themselves,
          # so spinning up Postgres just slows the run and risks a spurious
          # failure if Docker isn't ready on the runner.
          #
          # Gated on E2E_CLERK_SECRET_KEY being a non-empty secret so:
          #   - pre-Clerk-setup PRs: smoke runs, no DB, fast green
          #   - post-Clerk-setup PRs: journeys run against a real test DB
          # Operator flips both on at once per the runbooks in
          # qa/reports/2026-05-11/.
          E2E_USE_TEST_DB: ${{ secrets.E2E_CLERK_SECRET_KEY != '' && 'true' || 'false' }}
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          # --- END: Ephemeral test DB block ---

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test-results (screenshots, videos, traces)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
