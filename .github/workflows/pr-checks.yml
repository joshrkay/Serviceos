name: PR Checks

on:
  pull_request:
    branches: [main]

# VQ-025 — `voice-quality` job posts a sticky PR comment with the
# voice-quality report, which requires write access to PR comments.
# `contents: read` is the standard checkout permission.
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Type check API (build config)
        run: npx tsc --project tsconfig.build.json --noEmit
        working-directory: packages/api

      - name: Type check Web
        run: npx tsc --noEmit
        working-directory: packages/web

      - name: Lint
        run: npm run lint

      # infra/ (AWS CDK, D-001) was quarantined to experiments/infra (B9)
      # as not deployed/not in CI, then removed entirely in 2026-07 along
      # with the rest of experiments/. See docs/decisions.md D-016.

      - name: AI gateway guard
        run: npm run check:ai-gateway-guard --workspace=packages/api

      - name: FK-path coverage guard
        run: npm run check:fk-paths --workspace=packages/api

      - name: Unit tests
        run: npm test -- --reporter=verbose

      # packages/mobile is an isolated project (not a root workspace), so the
      # `npm test` sweep above skips it. Run its Vitest suite (logic, hooks, and
      # jsdom screen contract tests) with the root-hoisted vitest — no Expo
      # install needed; vitest.config.ts is self-contained and the coverage
      # provider (@vitest/coverage-v8) + jsdom/@testing-library/react are root
      # devDeps. --coverage enforces the per-lane thresholds in vitest.config.ts.
      # RN component tests (jest-expo) are intentionally not gated here.
      - name: Mobile unit tests
        run: npx vitest run --root packages/mobile --coverage

      - name: Pre-pull Postgres test image
        run: docker pull pgvector/pgvector:pg16

      - name: Integration tests
        run: npm run test:integration
        working-directory: packages/api
        env:
          TEST_DB: testcontainers

      - name: Coverage check
        run: npm run test:coverage

      - name: Per-module coverage thresholds (PRD §13)
        run: npx ts-node scripts/check-coverage.ts
        working-directory: packages/api

  # VQ-024 — Voice Quality v1 Layer 1 corpus suite.
  #
  # Runs the 40-script voice-quality corpus against the InMemory repo
  # bundle. Today's entry uses createMockLLMGateway (canned classifier
  # response) — cassettes are not yet wired into the corpus runner.
  # This is the fast PR-time signal that a code change broke the voice
  # agent's orchestration / runner / event-bus / grader pipeline.
  #
  # Voice-quality is a required check. Use the override procedure in
  # docs/superpowers/runbooks/voice-quality-launch-gate.md §4 when CI
  # is red due to a confirmed test bug rather than an agent regression.
  # The artifact upload step uses `if: always()` so failures stay visible.
  #
  # The plan calls for `needs: [typecheck]`, but the current pipeline
  # bundles typecheck into the `test` job, so we depend on that.
  voice-quality:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run voice quality suite
        run: npm run voice-quality --workspace=packages/api
        # WS1 (QUALITY-2026-07-12) — enforce the launch gate: the merge step
        # exits non-zero when launchGate.pass is false (floor break, a bucket
        # under threshold incl. Spanish ≥90%, or overall <90%). Without this
        # the corpus could regress while the job stayed green.
        env:
          VOICE_QUALITY_ENFORCE_LAUNCH_GATE: 'true'
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: voice-quality-report
          path: packages/api/voice-quality-report.json
      # VQ-025 — Post the report as a sticky PR comment. Runs even when
      # the corpus suite fails so the author still has a signal; the
      # script handles a missing report file with a fallback message.
      - name: Post voice quality summary to PR
        if: always() && github.event_name == 'pull_request'
        run: npx ts-node .github/scripts/post-voice-quality-pr-comment.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_PATH: packages/api/voice-quality-report.json

  # WS7 — Mobile typecheck gate.
  #
  # packages/mobile is an isolated Expo project (intentionally NOT a root npm
  # workspace — see packages/mobile/package.json), so the root `npm ci` in the
  # `test` job never installs it and its `tsc --noEmit` never ran in CI. This
  # dedicated job installs the mobile tree and gates its typecheck, catching
  # type regressions in the mobile client on every PR.
  #
  # RN component tests (`npm run test:rn`, jest-expo) remain INTENTIONALLY
  # UNGATED: the `jest` command currently globs the Vitest `*.test.ts` specs
  # (which import from 'vitest' and set `@vitest-environment jsdom`) and fails
  # to load all 84 suites — jest has no config scoping it to jest-expo specs.
  # Gating it today would be a permanent red. Wiring a jest.config that selects
  # only jest-expo specs (and excludes the Vitest suites) is the prerequisite,
  # tracked separately. The Vitest mobile suite (logic/hooks/jsdom screen
  # contracts) already gates in the `test` job's "Mobile unit tests" step.
  mobile-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            packages/mobile/package-lock.json
      # BOTH installs are required: mobile's own npm ci provides expo/RN types
      # (mobile is not a root workspace), while the ROOT npm ci provides the
      # deps its ../shared imports resolve against (zod) and the hoisted
      # @testing-library/react its vitest specs type against. With only the
      # isolated install, tsc fails on every ../shared contract (TS2307).
      - name: Install root workspace deps
        run: npm ci
      - name: Install mobile deps
        run: npm ci
        working-directory: packages/mobile
      # Run inside the package dir — mobile is not a root npm workspace, so
      # `--workspace=packages/mobile` would not resolve.
      - name: Type check Mobile
        run: npm run typecheck
        working-directory: packages/mobile
