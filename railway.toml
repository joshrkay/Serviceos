# Railway build config — api stage targets the Node.js production image
[build]
dockerfilePath = "Dockerfile"
dockerfileTarget = "api"

[deploy]
startCommand = "node packages/api/dist/src/db/migrate.js 2>&1 || true; echo '[shell] starting index.js'; node packages/api/dist/src/index.js 2>&1; echo '[shell] index.js exited: '$?"
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
