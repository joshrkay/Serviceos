# Railway build config — api stage targets the Node.js production image
[build]
dockerfilePath = "Dockerfile"
dockerfileTarget = "api"

[deploy]
startCommand = "timeout 30 node packages/api/dist/src/db/migrate.js || true; node packages/api/dist/src/index.js"
healthcheckPath = "/ready"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
