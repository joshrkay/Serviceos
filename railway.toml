# Railway build config — api stage targets the Node.js production image
[build]
dockerfilePath = "Dockerfile"
dockerfileTarget = "api"

[deploy]
# Keep startup focused on serving traffic; run DB migrations as a separate
# one-off/release step (CI/CD or Railway pre-deploy command).
preDeployCommand = "node packages/api/dist/src/db/migrate.js"
startCommand = "node packages/api/dist/src/index.js"
# Liveness probe — /health is always 200 when the server is up. Not /ready:
# /ready 503s on a cold/unreachable DB and would roll back healthy deploys.
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Tell Railway's edge which container port to route traffic to. The app
# (packages/api/src/index.ts) listens on ${PORT}, set below.
port = 3000

# DEV-ONLY: this branch deploys to the `dev` Railway environment. Baking these
# in keeps the container self-sufficient when dashboard access is limited.
# NODE_ENV=development lets the API boot even before a Postgres service is
# linked — it falls back to in-memory instead of crash-looping (app.ts:475).
# Before this branch merges to main, move NODE_ENV to a per-environment
# dashboard variable: staging/prod MUST run NODE_ENV=production.
[deploy.environment]
PORT = "3000"
NODE_ENV = "development"
